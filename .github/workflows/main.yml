name: main

on:
  workflow_dispatch:
    inputs:
      confirm_run:
        description: "Type YES to run the pipeline"
        required: true
        default: "NO"

jobs:
  run-job:
    runs-on: ubuntu-latest

    if: ${{ github.event.inputs.confirm_run == 'YES' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use credentials securely
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          echo "Using credentials safely"
          # Example (DO NOT echo passwords in real pipelines)
          echo "Username is set"
